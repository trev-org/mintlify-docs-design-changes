      url: sdks/sdk-overview.md  
    - title: API reference
      itemType: reference
      url: api-references/index.md

productDirectory:
  title: Game developers - start building with PlayFab
  items:
    - title: Fundamentals
      # imageSrc should be square in ratio with no whitespace
      imageSrc: ./media/index/build.svg
      summary: Learn PlayFab’s fundamental concepts with tutorials and a demo game.
      url: get-started/index.yml

    - title: Identity
      imageSrc: ./media/index/build.svg
      summary: Manage player and developer identities across game titles.
      url: identity/index.yml

    - title: Live service management
      imageSrc: ./media/index/build.svg
      summary: Streamline every part of the development lifecycle from production to running a live game.
      url: live-service-management/index.yml

    - title: Economy, Monetization, & UGC
      imageSrc: ./media/index/engage.svg
      summary: Set up thriving in-game economies and UGC.
      url: economy-monetization/index.yml

    - title: Multiplayer
      imageSrc: ./media/index/engage.svg
      summary: Enable different multiplayer modes to connect players.
      url: multiplayer/index.yml

    - title: Community
      imageSrc: ./media/index/engage.svg
      summary: Create ways for players to connect and build community.
      url: community/index.yml

    - title: Player progression
      imageSrc: ./media/index/engage.svg
      summary: Create engaging gameplay with player statistics and leaderboard tracking.
      url: player-progression/index.yml
    
    - title: Game data
      imageSrc: ./media/index/analyze.svg
      summary: Get deep insights on player activity and take action.
      url: data-analytics/index.yml

