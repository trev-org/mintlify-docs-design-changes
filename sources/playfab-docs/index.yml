# root section (required)
title: PlayFab documentation
summary: Learn how to build and manage engaging games using Microsoft PlayFab services.
# brand: PlayFab

metadata:
  title: PlayFab documentation
  description: PlayFab is a complete backend platform for live games. 
  services: service
  ms.service: azure-playfab
  ms.topic: hub-page
  author: m-kdearnley
  ms.author: kdearnley
  ms.date: 03/19/2025

